name: Release (macOS) — GitHub

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Strip
        run: strip target/x86_64-apple-darwin/release/odyn

      - name: Rename
        run: cp target/x86_64-apple-darwin/release/odyn odyn-macos-x86_64

      - name: Upload to Codeberg release
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @odyn-macos-x86_64 \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}/assets?name=odyn-macos-x86_64"

  build-macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Strip
        run: strip target/aarch64-apple-darwin/release/odyn

      - name: Rename
        run: cp target/aarch64-apple-darwin/release/odyn odyn-macos-aarch64

      - name: Upload to Codeberg release
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @odyn-macos-aarch64 \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}/assets?name=odyn-macos-aarch64"

  generate-sums:
    needs:
      - build-macos-x86_64
      - build-macos-aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64
        run: |
          curl -L -o odyn-macos-x86_64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-macos-x86_64"

      - name: Download aarch64
        run: |
          curl -L -o odyn-macos-aarch64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-macos-aarch64"

      - name: Generate SHA256SUMS-macos
        run: sha256sum odyn-macos-* > SHA256SUMS-macos

      - name: Upload SHA256SUMS-macos
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @SHA256SUMS-macos \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}/assets?name=SHA256SUMS-macos"
