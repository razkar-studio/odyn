name: Release (macOS) — GitHub

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin

      - name: Build
        run: ODYN_INSTALL_METHOD=release cargo build --release --no-default-features --target x86_64-apple-darwin

      - name: Strip
        run: strip target/x86_64-apple-darwin/release/odyn

      - name: Rename
        run: cp target/x86_64-apple-darwin/release/odyn odyn-macos-x86_64

      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-macos-x86_64" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-macos-x86_64"

  build-macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Build
        run: ODYN_INSTALL_METHOD=release cargo build --release --no-default-features --target aarch64-apple-darwin

      - name: Strip
        run: strip target/aarch64-apple-darwin/release/odyn

      - name: Rename
        run: cp target/aarch64-apple-darwin/release/odyn odyn-macos-aarch64

      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-macos-aarch64" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-macos-aarch64"

  build-android-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ODYN_INSTALL_METHOD=release cross build --release --no-default-features --target aarch64-linux-android
      - name: Rename
        run: cp target/aarch64-linux-android/release/odyn odyn-android-aarch64
      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-android-aarch64" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-android-aarch64"

  build-android-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: armv7-linux-androideabi
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ODYN_INSTALL_METHOD=release cross build --release --no-default-features --target armv7-linux-androideabi
      - name: Rename
        run: cp target/armv7-linux-androideabi/release/odyn odyn-android-armv7
      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-android-armv7" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-android-armv7"

  build-android-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-linux-android
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ODYN_INSTALL_METHOD=release cross build --release --no-default-features --target x86_64-linux-android
      - name: Rename
        run: cp target/x86_64-linux-android/release/odyn odyn-android-x86_64
      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-android-x86_64" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-android-x86_64"

  build-netbsd-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-netbsd
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ODYN_INSTALL_METHOD=release cross build --release --no-default-features --target x86_64-unknown-netbsd
      - name: Strip
        run: strip target/x86_64-unknown-netbsd/release/odyn
      - name: Rename
        run: cp target/x86_64-unknown-netbsd/release/odyn odyn-netbsd-x86_64
      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-netbsd-x86_64" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-netbsd-x86_64"

  build-freebsd-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-freebsd
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ODYN_INSTALL_METHOD=release cross build --release --no-default-features --target x86_64-unknown-freebsd
      - name: Strip
        run: strip target/x86_64-unknown-freebsd/release/odyn
      - name: Rename
        run: cp target/x86_64-unknown-freebsd/release/odyn odyn-freebsd-x86_64
      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-freebsd-x86_64" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-freebsd-x86_64"

  build-freebsd-i686:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: i686-unknown-freebsd
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ODYN_INSTALL_METHOD=release cross build --release --no-default-features --target i686-unknown-freebsd
      - name: Strip
        run: strip target/i686-unknown-freebsd/release/odyn
      - name: Rename
        run: cp target/i686-unknown-freebsd/release/odyn odyn-freebsd-i686
      - name: Upload to Codeberg release
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@odyn-freebsd-i686" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=odyn-freebsd-i686"

  generate-sums:
    needs:
      - build-macos-x86_64
      - build-macos-aarch64
      - build-android-aarch64
      - build-android-armv7
      - build-android-x86_64
      - build-netbsd-x86_64
      - build-freebsd-x86_64
      - build-freebsd-i686
    runs-on: ubuntu-latest
    steps:
      - name: Download odyn-macos-x86_64
        run: |
          curl -L -o odyn-macos-x86_64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-macos-x86_64"

      - name: Download odyn-macos-aarch64
        run: |
          curl -L -o odyn-macos-aarch64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-macos-aarch64"

      - name: Download odyn-android-aarch64
        run: |
          curl -L -o odyn-android-aarch64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-android-aarch64"

      - name: Download odyn-android-armv7
        run: |
          curl -L -o odyn-android-armv7 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-android-armv7"

      - name: Download odyn-android-x86_64
        run: |
          curl -L -o odyn-android-x86_64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-android-x86_64"

      - name: Download odyn-netbsd-x86_64
        run: |
          curl -L -o odyn-netbsd-x86_64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-netbsd-x86_64"

      - name: Download odyn-freebsd-x86_64
        run: |
          curl -L -o odyn-freebsd-x86_64 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-freebsd-x86_64"

      - name: Download odyn-freebsd-i686
        run: |
          curl -L -o odyn-freebsd-i686 \
            "https://codeberg.org/razkar/odyn/releases/download/${{ github.ref_name }}/odyn-freebsd-i686"

      - name: Generate SHA256SUMS-github
        run: sha256sum odyn-* > SHA256SUMS-github

      - name: Upload SHA256SUMS-github
        run: |
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -X POST \
            -H "Authorization: token ${{ secrets.CODEBERG_TOKEN }}" \
            -F "attachment=@SHA256SUMS-github" \
            "https://codeberg.org/api/v1/repos/razkar/odyn/releases/${RELEASE_ID}/assets?name=SHA256SUMS-github"
