name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux-x86_64:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Strip
        run: strip target/x86_64-unknown-linux-gnu/release/odyn
      - name: Rename
        run: cp target/x86_64-unknown-linux-gnu/release/odyn odyn-linux-x86_64
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: odyn-linux-x86_64
          path: odyn-linux-x86_64

  build-linux-x86_64-musl:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Strip
        run: strip target/x86_64-unknown-linux-musl/release/odyn
      - name: Rename
        run: cp target/x86_64-unknown-linux-musl/release/odyn odyn-linux-x86_64-musl
